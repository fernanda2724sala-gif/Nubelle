<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NUBELA</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#F7F3EE;
color:#7A6256;
}

header{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

h1{
font-size:60px;
letter-spacing:8px;
font-weight:300;
margin-bottom:20px;
}

p{
font-size:18px;
max-width:400px;
line-height:1.6;
margin-bottom:35px;
}

a{
background:#E8C1C5;
padding:14px 35px;
border-radius:50px;
text-decoration:none;
color:white;
font-size:15px;
transition:.3s;
}

a:hover{
transform:scale(1.05);
}

section{
padding:60px 25px;
}

h2{
text-align:center;
font-size:30px;
margin-bottom:40px;
font-weight:300;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
gap:20px;
max-width:900px;
margin:auto;
}

.card{
background:white;
border-radius:20px;
padding:50px 20px;
text-align:center;
box-shadow:0 10px 30px rgba(0,0,0,.05);
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
}

footer{
padding:40px;
text-align:center;
font-size:14px;
}
</style>

</head>

<body>

<header>

<h1>NUBELA</h1>

<p>
Everything a girl needs ✨
</p>

<a href="#">
SHOP NOW
</a>

</header>

<section>

<h2>Categories</h2>

<div class="grid">

<div class="card">💄<br><br>Makeup</div>

<div class="card">🧴<br><br>Skincare</div>

<div class="card">👜<br><br>Bags</div>

<div class="card">👠<br><br>Fashion</div>

<div class="card">🕶️<br><br>Accessories</div>

<div class="card">🎀<br><br>More</div>

</div>

</section>

<footer>

Instagram · TikTok · WhatsApp

</footer>

</body>

</html>
